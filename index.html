<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D-karta</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <div id="map"></div>

    <div id="wiki-sidebar">

    <div id="search-container">
        <input
            id="search"
            type="text"
            placeholder="Search..."
            autocomplete="off">

        <div id="search-results"></div>
    </div>

    <div id="article-layout">

        <aside id="article-sidebar"></aside>

        <main id="article"></main>

    </div>

    </div>

</div>


<div id="editor">

    <button id="editor-toggle">🛠</button>

    <div id="editor-panel">

        <button id="draw-border">
            Draw Border
        </button>
        <button id="edit-border">
            Edit Border
        </button>
        <button id="move-settlement">
            Move Settlement
        </button>

    </div>

</div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="js/config.js"></script>
    <script src="js/gm.js"></script>
    <script src="js/map/map.js"></script>
    <script src="js/utils/frontmatter.js"></script>
    <script src="js/editor/editMode.js"></script>
    <script src="js/editor/drawBorder.js"></script>
    <script src="js/editor/editBorder.js"></script>
    <script src="js/editor/moveSettlement.js"></script>
    <script src="js/map/layers.js"></script>
    <script src="js/map/world.js"></script>
    <script src="js/settlements.js"></script>
    <script src="js/nations.js"></script>
    <script src="js/renderers/gmNotes.js"></script>
    <script src="js/renderers/images.js"></script>
    <script src="js/renderers/links.js"></script>
    <script src="js/renderers/years.js"></script>
    <script src="js/renderers/markdown.js"></script>
    <script src="js/ui/article.js"></script>
    <script src="js/wiki/sidebar.js"></script>
    <script src="js/wiki/wiki.js"></script>
    <script src="js/wiki/search.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
